# Common backend settings shared by all profiles.
spring.profiles.default=dev

spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Reject unknown JSON fields in request bodies
spring.jackson.deserialization.fail-on-unknown-properties=true

# Optional: cleaner timestamp JSON output
spring.jackson.serialization.write-dates-as-timestamps=false

# Do not include framework exception details or stack traces in API error responses.
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
