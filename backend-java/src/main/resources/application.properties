# SQLite datasource
spring.datasource.url=jdbc:sqlite:monthly-dashboard.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Reject unknown JSON fields in request bodies
spring.jackson.deserialization.fail-on-unknown-properties=true

# Optional: cleaner timestamp JSON output
spring.jackson.serialization.write-dates-as-timestamps=false

# Comma-separated origins allowed to call the API.
# Override in deployment with APP_CORS_ALLOWED_ORIGINS, for example:
# APP_CORS_ALLOWED_ORIGINS=https://dashboard.example.com,https://www.dashboard.example.com
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
