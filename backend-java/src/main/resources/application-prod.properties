# Production/private deployment profile.
# Example: APP_DATASOURCE_URL=jdbc:sqlite:/opt/monthly-dashboard/data/monthly-dashboard.db
spring.datasource.url=${APP_DATASOURCE_URL}

# Keep schema updates explicit through configuration for private V2.
# Set APP_JPA_DDL_AUTO=validate after the deployed schema is stable.
spring.jpa.hibernate.ddl-auto=${APP_JPA_DDL_AUTO:update}
spring.jpa.show-sql=false

# Required in production. Example:
# APP_CORS_ALLOWED_ORIGINS=https://dashboard.example.com
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

logging.level.root=${APP_LOG_LEVEL:INFO}
logging.level.org.hibernate.SQL=OFF
